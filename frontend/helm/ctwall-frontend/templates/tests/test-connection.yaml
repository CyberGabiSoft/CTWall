apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ctwall-frontend.fullname" . }}-test-connection"
  labels:
    {{- include "ctwall-frontend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['--no-check-certificate', '-qO-', 'https://{{ include "ctwall-frontend.fullname" . }}:{{ .Values.service.port }}/']
  restartPolicy: Never
