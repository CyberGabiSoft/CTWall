# Secret Helm values for ctwall-backend.
# DO NOT commit real secrets.
#
# Example:
# cp backend/helm/ctwall-backend/examples/backend-secrets.example.yaml ./deploy/backend-secrets.yaml

# Optional explicit in-chart PostgreSQL password.
# If empty and postgresql.enabled=true, default development password is used.
postgresql:
  auth:
    password: "change-me-postgres"
