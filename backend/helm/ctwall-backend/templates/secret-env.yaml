{{- if and .Values.secretEnv.create (not .Values.secretEnv.existingSecret) }}
{{- $secretName := include "ctwall-backend.secretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingData := dict -}}
{{- if $existingSecret }}
{{- $existingData = $existingSecret.data -}}
{{- end }}
{{- $postgresPassword := .Values.postgresql.auth.password -}}
{{- if eq (trim $postgresPassword) "" -}}
  {{- $globalValues := (default (dict) .Values.global) -}}
  {{- $globalPostgresql := (default (dict) (get $globalValues "postgresql")) -}}
  {{- $globalAuth := (default (dict) (get $globalPostgresql "auth")) -}}
  {{- $postgresPassword = (default "" (get $globalAuth "password")) -}}
{{- end -}}
{{- if eq (trim $postgresPassword) "" -}}
  {{- if and $existingSecret (hasKey $existingData .Values.secretEnv.postgresPasswordKey) -}}
    {{- $postgresPassword = (b64dec (get $existingData .Values.secretEnv.postgresPasswordKey)) -}}
  {{- else -}}
    {{- $postgresPassword = "change-me-postgres" -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "ctwall-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secretEnv.postgresPasswordKey }}: {{ $postgresPassword | quote }}
{{- end }}
