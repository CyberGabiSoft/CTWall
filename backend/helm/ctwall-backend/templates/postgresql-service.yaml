{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ctwall-backend.postgresqlServiceName" . }}
  labels:
    {{- include "ctwall-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "ctwall-backend.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}
