{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ctwall-backend.fullname" . }}-data
  labels:
    {{- include "ctwall-backend.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}

{{- if and .Values.configPersistence.enabled (not .Values.configPersistence.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ctwall-backend.fullname" . }}-config
  labels:
    {{- include "ctwall-backend.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.configPersistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.configPersistence.size }}
  {{- if .Values.configPersistence.storageClass }}
  storageClassName: {{ .Values.configPersistence.storageClass }}
  {{- end }}
{{- end }}
