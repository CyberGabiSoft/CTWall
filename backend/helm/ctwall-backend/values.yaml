replicaCount: 1

image:
  repository: docker.io/cybergabi/ctwall-backend
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

initializerResources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

probes:
  startup:
    enabled: true
    tcpSocketPort: http
    periodSeconds: 5
    failureThreshold: 30
  liveness:
    enabled: true
    tcpSocketPort: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  readiness:
    enabled: true
    tcpSocketPort: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 6

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  mountPath: /app/data

configPersistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  mountPath: /app/config

secretEnv:
  # Secret used primarily for PostgreSQL password wiring.
  # Runtime backend secrets (JWT/app encryption/alertmanager creds) are generated by backend initializer
  # and persisted in /app/config/secrets.yaml.
  # When existingSecret is set, chart won't create the secret and will use that one.
  existingSecret: ""
  create: true
  nameSuffix: env
  postgresPasswordKey: POSTGRES_PASSWORD

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "18"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    username: appuser
    database: appdb
    # Optional override. Empty uses default development password.
    password: "change-me-postgres"
  persistence:
    enabled: false
    existingClaim: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  resources: {}
  podSecurityContext: {}
  securityContext: {}

env:
  DB_URL: '{{ printf "postgres://%s:%s@%s:%v/%s?sslmode=disable" .Values.postgresql.auth.username (default "change-me-postgres" .Values.postgresql.auth.password) (include "ctwall-backend.postgresqlServiceName" .) .Values.postgresql.service.port .Values.postgresql.auth.database }}'

extraEnv: []
# extraEnv:
#   - name: LOG_LEVEL
#     value: debug

extraEnvFrom: []
# extraEnvFrom:
#   - secretRef:
#       name: my-extra-secret

config:
  server:
    port: "8080"
    read_timeout: "10s"
    write_timeout: "10s"
    idle_timeout: "60s"

  storage:
    path: "data/blob_storage"

  logging:
    level: "info"

  database:
    url: '{{ printf "postgres://%s:%s@%s:%v/%s?sslmode=disable" .Values.postgresql.auth.username (default "change-me-postgres" .Values.postgresql.auth.password) (include "ctwall-backend.postgresqlServiceName" .) .Values.postgresql.service.port .Values.postgresql.auth.database }}'
    ping_timeout: "5s"
    max_open_conns: 20
    max_idle_conns: 10
    conn_max_lifetime: "30m"
    conn_max_idle_time: "10m"
    auto_apply_on_start: true
    migrations_path: "src/migrations"

  auth:
    jwt_issuer: "ctwall-backend"
    access_token_ttl: "30m"
    refresh_token_ttl: "72h"
    cookie_name: "__Host-CTWALL_SESSION"
    refresh_cookie_name: "__Secure-CTWALL_REFRESH"
    cookie_secure: true
    allow_insecure_cookies: false

  alerting:
    alertmanager:
      enabled: true
      url: "http://127.0.0.1:9093"
      request_timeout: "10s"
      config_file_path: "alertmanager.yml"
      public_base_url: ""
      control_poll_interval: "10s"
      dispatch_poll_interval: "3s"
      heartbeat_interval: "5m"
      dispatch_workers: 2
      claim_batch_size: 20
      retry_max_attempts: 50
      retry_max_window: "72h"
      route_group_by: ["project_id", "severity", "category", "alert_type", "dedup_key"]
      route_group_wait: "30s"
      route_group_interval: "5m"
      route_repeat_interval: "30m"

  malware:
    osv:
      enabled: true
      base_url: "https://storage.googleapis.com/osv-vulnerabilities"
      all_zip_url: "https://storage.googleapis.com/osv-vulnerabilities/all.zip"
      modified_csv_url: "https://storage.googleapis.com/osv-vulnerabilities/modified_id.csv"
      data_path: "osv"
      full_sync_interval: "168h"
      latest_sync_interval: "1h"
      timeout: "2m"
      bootstrap_on_start:
        seed_state_from_store_on_start: true

  workers:
    ingest_workers: "2"
    malware_input_workers: "2"
    malware_component_analysis_workers: "2"
    malware_test_revision_summary_workers: "2"
    malware_test_revision_diff_workers: "2"
    malware_component_analysis_claim_batch_size: 5
    malware_component_analysis_scheduler_enqueue_limit: 1000

# Optional raw backend config content (exact YAML string passed with --set-file).
# When set, it overrides .Values.config in ConfigMap.
#
# Example:
# helm upgrade --install ctwall-backend ./backend/helm/ctwall-backend -n ctwall \
#   -f ./deploy/backend-values.yaml \
#   -f ./deploy/backend-secrets.yaml \
#   --set-file configRaw=./backend/config.yaml
configRaw: ""

alertmanager:
  image:
    repository: prom/alertmanager
    tag: v0.28.1
    pullPolicy: IfNotPresent
  initImage:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  listenPort: 9093
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi
  bootstrapConfig: |
    route:
      receiver: blackhole

    receivers:
      - name: blackhole
