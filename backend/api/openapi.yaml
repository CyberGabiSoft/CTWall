openapi: 3.1.0
info:
  title: CTWall Backend API
  version: 1.0.0
  description: |
    API for ChainThreatWall (CTWall) - SBOM Management and Security Analysis System.
    Adheres to OWASP ASVS Level 2 Security Requirements.
    Uses RFC 7807 for error handling.

servers:
  - url: https://api.ctwall.internal/api/v1
    description: Production Server
  - url: http://localhost:8080/api/v1
    description: Local Development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        API token for user/service accounts/CLI.
        Use: `Authorization: Bearer <API_TOKEN>`.
    CookieAuth:
      type: apiKey
      in: cookie
      name: __Host-CTWALL_SESSION
      description: |
        Session JWT stored in HttpOnly cookie for GUI users.
    RefreshCookieAuth:
      type: apiKey
      in: cookie
      name: __Secure-CTWALL_REFRESH
      description: |
        Refresh token stored in HttpOnly cookie for GUI session renewal.

  schemas:
    # --- RFC 7807 Error ---
    Error:
      type: object
      description: RFC 7807 Problem Details
      properties:
        type:
          type: string
          maxLength: 120
          format: uri
          example: "about:blank"
        title:
          type: string
          maxLength: 120
          example: "Invalid Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          maxLength: 120
          example: "Field 'sbom_file' is missing."
        instance:
          type: string
          maxLength: 120
          example: "/api/v1/ingest"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          maxLength: 120
          format: email
        password:
          type: string
          maxLength: 120
          format: password

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          maxLength: 120
          format: password
        newPassword:
          type: string
          minLength: 12
          maxLength: 120
          format: password

    UserProfile:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        email:
          type: string
          maxLength: 120
          format: email
        role:
          type: string
          maxLength: 120
          enum: [ADMIN, WRITER, READER, NONE]
        accountType:
          type: string
          maxLength: 120
          enum: [USER, SERVICE_ACCOUNT]
        fullName:
          type: string
          maxLength: 120

    CreateUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          maxLength: 120
          format: email
        password:
          type: string
          minLength: 12
          maxLength: 120
          format: password
        role:
          type: string
          maxLength: 120
          enum: [ADMIN, WRITER, READER, NONE]
        accountType:
          type: string
          maxLength: 120
          enum: [USER, SERVICE_ACCOUNT]
          default: USER
        fullName:
          type: string
          maxLength: 120

    UpdateUserRequest:
      type: object
      required: [role, accountType]
      properties:
        role:
          type: string
          maxLength: 120
          enum: [ADMIN, WRITER, READER, NONE]
        accountType:
          type: string
          maxLength: 120
          enum: [USER, SERVICE_ACCOUNT]
        fullName:
          type: string
          maxLength: 120

    ResetUserPasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 12
          maxLength: 120
          format: password

    CreateUserTokenRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        expiresAt:
          type: string
          maxLength: 120
          format: date-time

    CreateUserTokenResponse:
      type: object
      properties:
        tokenId:
          type: string
          maxLength: 120
          format: uuid
        token:
          type: string
          maxLength: 120
        name:
          type: string
          maxLength: 120
        expiresAt:
          type: string
          maxLength: 120
          format: date-time
        createdAt:
          type: string
          maxLength: 120
          format: date-time

    # --- Domain Entities ---
    Product:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        name:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 120
        createdAt:
          type: string
          maxLength: 120
          format: date-time
        updatedAt:
          type: string
          maxLength: 120
          format: date-time
        archivedAt:
          type: string
          maxLength: 120
          format: date-time

    Scope:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        productId:
          type: string
          maxLength: 120
          format: uuid
        name:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 120
        archivedAt:
          type: string
          maxLength: 120
          format: date-time

    SbomType:
      type: object
      required: [standard, specVersion]
      properties:
        standard:
          type: string
          maxLength: 120
          enum: [cyclonedx, spdx, swid]
        specVersion:
          type: string
          maxLength: 120
          pattern: '^(unknown|\\d+(\\.\\d+){0,2})$'
          default: unknown

    Test:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        scopeId:
          type: string
          maxLength: 120
          format: uuid
        name:
          type: string
          maxLength: 120
        sbomType:
          $ref: "#/components/schemas/SbomType"
        isPublic:
          type: boolean
        publicToken:
          type: string
          maxLength: 120
        createdAt:
          type: string
          maxLength: 120
          format: date-time
        updatedAt:
          type: string
          maxLength: 120
          format: date-time
        archivedAt:
          type: string
          maxLength: 120
          format: date-time

    TestRevision:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        testId:
          type: string
          maxLength: 120
          format: uuid
        sbomSha256:
          type: string
          maxLength: 120
        sbomProducer:
          type: string
          maxLength: 120
          enum: [trivy, syft, grype, other]
        tags:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 64
        metadataJson:
          type: object
        sbomMetadataJson:
          type: object
        componentsImportedCount:
          type: integer
        isActive:
          type: boolean
        lastModifiedAt:
          type: string
          maxLength: 120
          format: date-time
        createdAt:
          type: string
          maxLength: 120
          format: date-time

    DepAlertRevisionVerdict:
      type: object
      required:
        - projectId
        - testId
        - revisionId
        - verdict
        - totalComponents
        - malwareComponents
        - cleanComponents
        - unknownComponents
        - computedAt
      properties:
        projectId:
          type: string
          maxLength: 120
          format: uuid
        testId:
          type: string
          maxLength: 120
          format: uuid
        revisionId:
          type: string
          maxLength: 120
          format: uuid
        verdict:
          type: string
          maxLength: 120
          enum: [MALWARE, CLEAN, UNKNOWN]
        totalComponents:
          type: integer
          minimum: 0
        malwareComponents:
          type: integer
          minimum: 0
        cleanComponents:
          type: integer
          minimum: 0
        unknownComponents:
          type: integer
          minimum: 0
        computedAt:
          type: string
          format: date-time

    Component:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        revisionId:
          type: string
          maxLength: 120
          format: uuid
        purl:
          type: string
          maxLength: 2048
        pkgName:
          type: string
          maxLength: 120
        version:
          type: string
          maxLength: 120
        pkgType:
          type: string
          maxLength: 120
        pkgNamespace:
          type: string
          maxLength: 120
        sbomType:
          type: string
          maxLength: 120
        publisher:
          type: string
          maxLength: 120
        supplier:
          type: string
          maxLength: 120
        licenses:
          type: array
          items:
            type: object
        properties:
          type: object
        malwareVerdict:
          type: string
          maxLength: 120
          enum: [MALWARE, CLEAN, UNKNOWN]
        malwareFindingsCount:
          type: integer
        malwareScannedAt:
          type: string
          maxLength: 120
          format: date-time
          nullable: true
        malwareValidUntil:
          type: string
          maxLength: 120
          format: date-time
          nullable: true
        malwarePurls:
          type: array
          items:
            type: string
            maxLength: 2048
        malwareQueueStatus:
          type: string
          maxLength: 120
          nullable: true
        malwareQueueCompletedAt:
          type: string
          maxLength: 120
          format: date-time
          nullable: true
        createdAt:
          type: string
          maxLength: 120
          format: date-time

    AnalysisResult:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        componentPurl:
          type: string
          maxLength: 2048
        componentHash:
          type: string
          maxLength: 120
        verdict:
          type: string
          maxLength: 120
          enum: [MALWARE, CLEAN, UNKNOWN]
        findingsCount:
          type: integer
        summary:
          type: string
          maxLength: 4096
        scannedAt:
          type: string
          maxLength: 120
          format: date-time
        validUntil:
          type: string
          maxLength: 120
          format: date-time

    ComponentAnalysisQueueItem:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        componentPurl:
          type: string
          maxLength: 2048
        status:
          type: string
          maxLength: 120
          enum: [PENDING, PROCESSING, COMPLETED, FAILED]
        reason:
          type: string
          maxLength: 120
          enum: [SCHEDULED, MANUAL, BACKFILL]
        attempts:
          type: integer
        lastError:
          type: string
          maxLength: 4096
        lockedAt:
          type: string
          maxLength: 120
          format: date-time
        lockedBy:
          type: string
          maxLength: 255
        scheduledFor:
          type: string
          maxLength: 120
          format: date-time
        createdAt:
          type: string
          maxLength: 120
          format: date-time
        updatedAt:
          type: string
          maxLength: 120
          format: date-time
        completedAt:
          type: string
          maxLength: 120
          format: date-time

    ComponentAnalysisFinding:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        componentPurl:
          type: string
          maxLength: 2048
        malwarePurl:
          type: string
          maxLength: 2048
        sourceMalwareInputResultId:
          type: string
          maxLength: 120
          format: uuid
        matchType:
          type: string
          maxLength: 120
          enum: [EXACT, CONTAINS_PREFIX]
        createdAt:
          type: string
          maxLength: 120
          format: date-time
        updatedAt:
          type: string
          maxLength: 120
          format: date-time

    ComponentAnalysisEnqueueRequest:
      type: object
      required: [componentPurl]
      properties:
        componentPurl:
          type: string
          maxLength: 2048
        reason:
          type: string
          maxLength: 120
          enum: [SCHEDULED, MANUAL, BACKFILL]

    ComponentAnalysisMalwareSchedule:
      type: object
      properties:
        enabled:
          type: boolean
        interval:
          type: string
          maxLength: 120
          description: Go duration string (e.g. "24h", "30m"). Returned even when disabled.
        updatedAt:
          type: string
          maxLength: 120
          format: date-time

    ComponentAnalysisMalwareSchedulePatchRequest:
      type: object
      properties:
        enabled:
          type: boolean
        interval:
          type: string
          maxLength: 120
          description: Go duration string (e.g. "24h", "30m"). When enabled is true, interval must be > 0.

    TestRevisionMalwareSummary:
      type: object
      description: Materialized malware summary for the active test revision (cached read model).
      properties:
        revisionId:
          type: string
          maxLength: 120
          format: uuid
        malwareComponentCount:
          type: integer
          minimum: 0
        computedAt:
          type: string
          maxLength: 120
          format: date-time
          nullable: true
        updatedAt:
          type: string
          maxLength: 120
          format: date-time
        status:
          type: string
          maxLength: 120
          enum: [PENDING, COMPUTED]

    ScanComponentResult:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        componentPurl:
          type: string
          maxLength: 2048
        componentHash:
          type: string
          maxLength: 120
        analysisResultId:
          type: string
          maxLength: 120
          format: uuid
        scanId:
          type: string
          maxLength: 120
          format: uuid
        sourceId:
          type: string
          maxLength: 120
          format: uuid
        resultFilename:
          type: string
          maxLength: 255
        evidence:
          type: string
          maxLength: 4096
        detailsJson:
          type: object
        publishedAt:
          type: string
          maxLength: 120
          format: date-time
        modifiedAt:
          type: string
          maxLength: 120
          format: date-time
        detectVersion:
          type: string
          maxLength: 120
        fixedVersion:
          type: string
          maxLength: 120
        isMalware:
          type: boolean
        createdAt:
          type: string
          maxLength: 120
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        actorId:
          type: string
          maxLength: 120
          format: uuid
        action:
          type: string
          maxLength: 200
        entityType:
          type: string
          maxLength: 200
        entityId:
          type: string
          maxLength: 120
          format: uuid
        details:
          type: object
        ipAddress:
          type: string
          maxLength: 200
        createdAt:
          type: string
          maxLength: 120
          format: date-time

    EventAggregate:
      type: object
      properties:
        eventKey:
          type: string
          maxLength: 240
        category:
          type: string
          maxLength: 120
        severity:
          type: string
          maxLength: 16
          enum: [INFO, WARN, ERROR]
        minRole:
          type: string
          maxLength: 16
          enum: [read, write, admin]
        title:
          type: string
          maxLength: 240
        message:
          type: string
          maxLength: 2000
        component:
          type: string
          maxLength: 240
        errorId:
          type: string
          maxLength: 120
        projectId:
          type: string
          maxLength: 120
          format: uuid
        firstSeenAt:
          type: string
          maxLength: 120
          format: date-time
        lastSeenAt:
          type: string
          maxLength: 120
          format: date-time
        occurrences:
          type: integer
        acknowledgedAt:
          type: string
          maxLength: 120
          format: date-time
        status:
          type: string
          maxLength: 32
          enum: [open, acknowledged]

    EventsOpenCountResponse:
      type: object
      properties:
        count:
          type: integer
          example: 12

    EventsListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EventAggregate"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    EventDetailsResponse:
      type: object
      properties:
        event:
          $ref: "#/components/schemas/EventAggregate"
        occurrences:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"

    DashboardTopItem:
      type: object
      properties:
        name:
          type: string
          maxLength: 240
        value:
          type: integer

    DashboardPackageType:
      type: object
      properties:
        packageType:
          type: string
          maxLength: 120
        count:
          type: integer
        percentage:
          type: number
          format: float

    DashboardMalwarePackage:
      type: object
      properties:
        purl:
          type: string
          maxLength: 2048
        occurrences:
          type: integer
        lastSeenAt:
          type: string
          maxLength: 120
          format: date-time
          nullable: true

    DashboardIngestActivity:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        timestamp:
          type: string
          maxLength: 120
          format: date-time
        status:
          type: string
          maxLength: 120
        stage:
          type: string
          maxLength: 120
        componentsImported:
          type: integer
        productId:
          type: string
          maxLength: 120
          format: uuid
          nullable: true
        scopeId:
          type: string
          maxLength: 120
          format: uuid
          nullable: true
        testId:
          type: string
          maxLength: 120
          format: uuid
          nullable: true
        productName:
          type: string
          maxLength: 240
        scopeName:
          type: string
          maxLength: 240
        testName:
          type: string
          maxLength: 240
        errorMessage:
          type: string
          maxLength: 2000

    DashboardIngestBucket:
      type: object
      properties:
        bucketStart:
          type: string
          maxLength: 120
          format: date-time
        imports:
          type: integer
        componentsImported:
          type: integer

    DashboardVerdictDistribution:
      type: object
      properties:
        malware:
          type: integer
        clean:
          type: integer
        unknown:
          type: integer

    DashboardKpis:
      type: object
      properties:
        malwareActive:
          type: integer
        affectedTests:
          type: integer
        oldestPackageScanAt:
          type: string
          maxLength: 120
          format: date-time
          nullable: true
        lastAnalysisAt:
          type: string
          maxLength: 120
          format: date-time
          nullable: true
        lastMalwareSummaryComputedAt:
          type: string
          maxLength: 120
          format: date-time
          nullable: true
        ingestImports:
          type: integer
        ingestComponents:
          type: integer
        overridesActive:
          type: integer

    DashboardOverviewData:
      type: object
      properties:
        generatedAt:
          type: string
          maxLength: 120
          format: date-time
        rangeStart:
          type: string
          maxLength: 120
          format: date-time
        rangeEnd:
          type: string
          maxLength: 120
          format: date-time
        projectCount:
          type: integer
        topN:
          type: integer
        kpis:
          $ref: "#/components/schemas/DashboardKpis"
        verdictDistribution:
          $ref: "#/components/schemas/DashboardVerdictDistribution"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/DashboardTopItem"
        topScopes:
          type: array
          items:
            $ref: "#/components/schemas/DashboardTopItem"
        topPackageTypes:
          type: array
          items:
            $ref: "#/components/schemas/DashboardPackageType"
        topMalwarePackages:
          type: array
          items:
            $ref: "#/components/schemas/DashboardMalwarePackage"
        recentIngest:
          type: array
          items:
            $ref: "#/components/schemas/DashboardIngestActivity"
        ingestTrend:
          type: array
          items:
            $ref: "#/components/schemas/DashboardIngestBucket"

    DashboardOverviewResponse:
      type: object
      properties:
        scope:
          type: string
          maxLength: 32
          enum: [project]
        projectId:
          type: string
          maxLength: 120
          format: uuid
        range:
          type: string
          maxLength: 8
          enum: [24h, 7d, 30d, 90d]
        data:
          $ref: "#/components/schemas/DashboardOverviewData"

    DataGraphNode:
      type: object
      properties:
        id:
          type: string
          maxLength: 2048
        label:
          type: string
          maxLength: 512
        purl:
          type: string
          maxLength: 2048
        pkgType:
          type: string
          maxLength: 120
        pkgNamespace:
          type: string
          maxLength: 240
        version:
          type: string
          maxLength: 160
        isMalware:
          type: boolean
        malwareCount:
          type: integer

    DataGraphEdge:
      type: object
      properties:
        from:
          type: string
          maxLength: 2048
        to:
          type: string
          maxLength: 2048
        relationshipType:
          type: string
          maxLength: 120

    DataGraphChainMetadata:
      type: object
      properties:
        projectId:
          type: string
          maxLength: 120
          format: uuid
        productId:
          type: string
          maxLength: 120
          format: uuid
        productName:
          type: string
          maxLength: 240
        scopeId:
          type: string
          maxLength: 120
          format: uuid
        scopeName:
          type: string
          maxLength: 240
        testId:
          type: string
          maxLength: 120
          format: uuid
        testName:
          type: string
          maxLength: 240
        revisionId:
          type: string
          maxLength: 120
          format: uuid
        sbomStandard:
          type: string
          maxLength: 32
        sbomSpecVersion:
          type: string
          maxLength: 32
        sbomProducer:
          type: string
          maxLength: 32
        generatedAt:
          type: string
          maxLength: 120
          format: date-time
        truncated:
          type: boolean
        truncationReason:
          type: string
          maxLength: 400
        nodeCount:
          type: integer
        edgeCount:
          type: integer

    DataGraphChainData:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/DataGraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DataGraphEdge"
        metadata:
          $ref: "#/components/schemas/DataGraphChainMetadata"

    DataGraphChainResponse:
      type: object
      properties:
        scope:
          type: string
          maxLength: 32
          enum: [project]
        projectId:
          type: string
          maxLength: 120
          format: uuid
        data:
          $ref: "#/components/schemas/DataGraphChainData"

    DataGraphComponentIdentity:
      type: object
      properties:
        id:
          type: string
          maxLength: 120
          format: uuid
        revisionId:
          type: string
          maxLength: 120
          format: uuid
        purl:
          type: string
          maxLength: 2048
        pkgName:
          type: string
          maxLength: 400
        version:
          type: string
          maxLength: 200
        pkgType:
          type: string
          maxLength: 120
        pkgNamespace:
          type: string
          maxLength: 240
        sbomType:
          type: string
          maxLength: 120
        publisher:
          type: string
          maxLength: 240
        supplier:
          type: string
          maxLength: 240
        licenses: {}
        properties: {}
        createdAt:
          type: string
          maxLength: 120
          format: date-time
        projectId:
          type: string
          maxLength: 120
          format: uuid
        projectName:
          type: string
          maxLength: 240
        productId:
          type: string
          maxLength: 120
          format: uuid
        productName:
          type: string
          maxLength: 240
        scopeId:
          type: string
          maxLength: 120
          format: uuid
        scopeName:
          type: string
          maxLength: 240
        testId:
          type: string
          maxLength: 120
          format: uuid
        testName:
          type: string
          maxLength: 240
        sbomStandard:
          type: string
          maxLength: 32
        sbomSpecVersion:
          type: string
          maxLength: 32
        sbomProducer:
          type: string
          maxLength: 32
        revisionIsActive:
          type: boolean
        revisionCreatedAt:
          type: string
          maxLength: 120
          format: date-time

    DataGraphMalwareSummary:
      type: object
      properties:
        verdict:
          type: string
          maxLength: 32
        findingsCount:
          type: integer
        summary:
          type: string
          maxLength: 4000
        scannedAt:
          type: string
          maxLength: 120
          format: date-time
          nullable: true
        validUntil:
          type: string
          maxLength: 120
          format: date-time
          nullable: true

    DataGraphComponentFinding:
