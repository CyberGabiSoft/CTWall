  # --- SBOMs ---
  /sboms:
    get:
      summary: List SBOM revisions (flat)
      operationId: listSboms
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
        - name: productId
          in: query
          schema:
            type: string
            maxLength: 120
            format: uuid
        - name: scopeId
          in: query
          schema:
            type: string
            maxLength: 120
            format: uuid
        - name: testId
          in: query
          schema:
            type: string
            maxLength: 120
            format: uuid
        - name: sbomType
          in: query
          deprecated: true
          description: "Legacy filter. Use sbomStandard + sbomSpecVersion instead."
          schema:
            type: string
            maxLength: 120
        - name: sbomStandard
          in: query
          schema:
            type: string
            maxLength: 120
            enum: [cyclonedx, spdx, swid]
        - name: sbomSpecVersion
          in: query
          schema:
            type: string
            maxLength: 120
            pattern: '^(unknown|\\d+(\\.\\d+){0,2})$'
        - name: sbomProducer
          in: query
          schema:
            type: string
            maxLength: 120
            enum: [trivy, syft, grype, other]
        - name: tag
          in: query
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: Flat list of SBOM revisions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    revisionId:
                      type: string
                      maxLength: 120
                      format: uuid
                    testId:
                      type: string
                      maxLength: 120
                      format: uuid
                    scopeId:
                      type: string
                      maxLength: 120
                      format: uuid
                    productId:
                      type: string
                      maxLength: 120
                      format: uuid
                    sbomSha256:
                      type: string
                      maxLength: 120
                    sbomType:
                      $ref: "#/components/schemas/SbomType"
                    sbomProducer:
                      type: string
                      maxLength: 120
                      enum: [trivy, syft, grype, other]
                    tags:
                      type: array
                      maxItems: 50
                      items:
                        type: string
                        maxLength: 64
                    componentsImportedCount:
                      type: integer
                    isActive:
                      type: boolean
                    lastModifiedAt:
                      type: string
                      maxLength: 120
                      format: date-time
                    createdAt:
                      type: string
                      maxLength: 120
                      format: date-time

  /sboms/{revisionId}/download:
    get:
      summary: Download Original SBOM
      operationId: downloadSbom
      parameters:
        - name: revisionId
          in: path
          required: true
          schema:
            type: string
            maxLength: 120
            format: uuid
      responses:
        '200':
          description: Original SBOM file
          headers:
            Content-Disposition:
              schema:
                type: string
                maxLength: 120
                example: "attachment; filename=sbom.json"
            X-Content-Type-Options:
              schema:
                type: string
                maxLength: 120
                example: "nosniff"
          content:
            application/gzip:
              schema:
                type: string
                maxLength: 120
                format: binary
            application/json:
              schema:
                type: object

