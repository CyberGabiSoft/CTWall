            maxLength: 120
            format: uuid
        - name: revisionId
          in: query
          required: false
          schema:
            type: string
            maxLength: 120
            format: uuid
        - name: producer
          in: query
          required: false
          schema:
            type: string
            maxLength: 16
            enum: [syft, trivy, grype, other]
        - name: maxNodes
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 1200
      responses:
