              schema:
                $ref: "#/components/schemas/Error"

  /security/posture/overview:
    get:
      summary: Project security posture overview (technical metrics)
      operationId: getSecurityPostureOverview
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            maxLength: 8
            enum: [24h, 7d, 30d, 90d]
            default: 7d
        - name: topN
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
        - name: bucket
          in: query
          required: false
          schema:
            type: string
            maxLength: 16
            enum: [day, week]
            default: day
      responses:
        '200':
          description: Security posture overview loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityPostureOverviewResponse"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Failed to load security posture overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Events ---
  /events/open-count:
    get:
      summary: Count open ERROR events for Events badge
      operationId: eventsOpenCount
      responses:
        '200':
          description: Open events count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsOpenCountResponse"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /events:
    get:
      summary: List aggregated Events (filtered + paginated, backend-side)
      operationId: listEvents
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            maxLength: 120
          description: Comma-separated list (INFO,WARN,ERROR). Default ERROR.
        - name: category_in
          in: query
          required: false
          schema:
            type: string
            maxLength: 400
          description: Legacy filter. Comma-separated list of categories to include (applies to all severities when severity-specific filters are not provided).
        - name: category_in_error
          in: query
          required: false
          schema:
            type: string
            maxLength: 400
          description: Comma-separated list of categories to include for ERROR (optional; empty/omitted = all categories).
        - name: category_in_warn
          in: query
          required: false
          schema:
            type: string
            maxLength: 400
          description: Comma-separated list of categories to include for WARN (optional; empty/omitted = all categories).
