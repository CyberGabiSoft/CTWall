security:
  - BearerAuth: []
  - CookieAuth: []

paths:
  /auth/login:
    post:
      summary: Login and set session + refresh cookies
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        '200':
          description: Logged in
          headers:
            Set-Cookie:
              schema:
                type: string
                maxLength: 120
              description: Session cookie (`__Host-CTWALL_SESSION`) and refresh cookie (`__Secure-CTWALL_REFRESH`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    maxLength: 120
                    example: ok
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      summary: Refresh session using refresh token cookie
      operationId: authRefresh
      security:
        - RefreshCookieAuth: []
      responses:
        '200':
          description: Session refreshed
          headers:
            Set-Cookie:
              schema:
                type: string
                maxLength: 120
              description: New session cookie (`__Host-CTWALL_SESSION`) and rotated refresh cookie (`__Secure-CTWALL_REFRESH`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    maxLength: 120
                    example: ok
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      summary: Logout and revoke refresh token
      operationId: authLogout
      responses:
        '204':
          description: Logged out
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/change-password:
    post:
      summary: Change current user password
      operationId: authChangePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        '204':
          description: Password updated
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Password update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/me:
    get:
      summary: Get current user
      operationId: authMe
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /dashboard/overview:
    get:
      summary: Project dashboard overview (active selected project)
      operationId: getDashboardOverview
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            maxLength: 8
            enum: [24h, 7d, 30d, 90d]
            default: 7d
        - name: topN
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
      responses:
        '200':
          description: Dashboard overview loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverviewResponse"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Failed to load dashboard overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /data/graph/chain:
    get:
      summary: Dependency graph chain for selected test/revision
      operationId: getDataGraphChain
      parameters:
        - name: testId
          in: query
          required: true
