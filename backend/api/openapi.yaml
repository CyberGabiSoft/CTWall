            type: string
            maxLength: 120
            format: uuid
        - name: purl
          in: query
          required: true
          schema:
            type: string
            maxLength: 2048
      responses:
        '200':
          description: Component details loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataGraphComponentDetailsResponse"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '404':
          description: Test/revision/component not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Failed to load component details
          content:
