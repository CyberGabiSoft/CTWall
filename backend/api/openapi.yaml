  # --- Ingest ---
  /ingest:
    post:
      summary: Upload SBOM
      description: Uploads a new SBOM file. Creates Product/Scope/Test if they don't exist.
      operationId: ingestSbom
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [sbom_file]
              properties:
                sbom_file:
                  type: string
                  maxLength: 120
                  format: binary
                  description: "The SBOM file (JSON/XML), optionally gzipped."
                product:
                  type: string
                  description: "Product name (or productId)"
                  maxLength: 120
                scope:
                  type: string
                  description: "Scope name (or scopeId)"
                  maxLength: 120
                test:
                  type: string
                  description: "Test name (or testId)"
                  maxLength: 120
                sbomType:
                  allOf:
                    - $ref: "#/components/schemas/SbomType"
                  description: "Optional SBOM type metadata. Must match the uploaded SBOM."
                sbomProducer:
                  type: string
                  maxLength: 120
                  enum: [trivy, syft, grype, other]
                tags:
                  type: array
                  maxItems: 50
                  items:
                    type: string
                    maxLength: 64
                metadataJson:
                  type: string
                  description: "JSON string with additional metadata"
                  maxLength: 65536
            encoding:
              sbomType:
                contentType: application/json
              metadataJson:
                contentType: application/json
      responses:
        '201':
          description: SBOM uploaded and processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  productId:
                    type: string
                    maxLength: 120
                    format: uuid
                  scopeId:
                    type: string
                    maxLength: 120
                    format: uuid
                  testId:
                    type: string
                    maxLength: 120
                    format: uuid
                  revisionId:
                    type: string
                    maxLength: 120
                    format: uuid
                  sbomSha256:
                    type: string
                    maxLength: 120
                  componentsImportedCount:
                    type: integer
                  createdAt:
                    type: string
                    maxLength: 120
                    format: date-time
        '400':
          description: Invalid input or file format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

